<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C6BFF"/>
      <stop offset="0.55" stop-color="#6D5EF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="wave" x1="180" y1="512" x2="844" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eafcff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0b1030" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded-square app tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>

  <!-- subtle flow ribbon behind the bars -->
  <path d="M120 640 C 300 520, 380 760, 560 620 S 840 500, 920 600"
        fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="46" stroke-linecap="round"/>

  <!-- voice waveform: rounded bars of varying height, centered -->
  <g fill="url(#wave)" filter="url(#soft)">
    <rect x="214" y="452" width="60" height="120" rx="30"/>
    <rect x="310" y="392" width="60" height="240" rx="30"/>
    <rect x="406" y="300" width="60" height="424" rx="30"/>
    <rect x="502" y="220" width="60" height="584" rx="30"/>
    <rect x="598" y="330" width="60" height="364" rx="30"/>
    <rect x="694" y="404" width="60" height="216" rx="30"/>
    <rect x="790" y="470" width="60" height="84"  rx="30"/>
  </g>
</svg>
