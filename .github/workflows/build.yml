name: "Build"

# OpenFlow release/build pipeline (milestone M5).
#
# Builds UNSIGNED / ad-hoc installers for macOS (arm64 + x64) and Windows.
# No Apple Developer cert, no notarization, no Windows Authenticode — the
# pipeline runs with zero signing credentials. Signing / notarization is
# deferred to a future public-distribution phase (see README).
#
# Triggers:
#   - workflow_dispatch : manual build, uploads installers as run artifacts.
#   - push tag v*       : builds and attaches installers to a GitHub Release
#                         (created as a draft) in addition to run artifacts.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      # Needed for tauri-action to create/upload the GitHub Release on tags.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14" # Apple Silicon (arm64) — prebuilt `ort` binary.
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-13" # Intel (x64) — no prebuilt `ort`, needs onnxruntime.
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest" # x64 — prebuilt `ort` binary.
            target: "x86_64-pc-windows-msvc"
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The `ort` crate has no prebuilt binary for x86_64-apple-darwin. Install
      # ONNX Runtime via Homebrew and link it dynamically. These env vars MUST be
      # exported BEFORE the "Build with Tauri" step so the Rust build (`ort`
      # build script) picks them up. Writing to $GITHUB_ENV makes them available
      # to all subsequent steps in this job.
      - name: Install ONNX Runtime (Intel macOS)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          brew install onnxruntime
          echo "ORT_LIB_LOCATION=$(brew --prefix onnxruntime)/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # tauri-action runs `bun run tauri build` (via the configured
      # beforeBuildCommand) and bundles the app. When `tagName` is set (tag
      # builds) it also creates a draft GitHub Release and uploads the bundles to
      # it. No signing secrets are provided — builds are unsigned/ad-hoc.
      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Always upload the installers as workflow run artifacts (for both manual
      # dispatch and tag builds). macOS -> .dmg, Windows -> .exe (NSIS) + .msi.
      - name: Upload installers (macOS)
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: openflow-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

      - name: Upload installers (Windows)
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v7
        with:
          name: openflow-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30
