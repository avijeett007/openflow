name: "Build"

# OpenFlow release/build pipeline.
#
# Flow:  test  ->  build (macOS arm64 + macOS x64 + Windows)  ->  publish
#
#   1. test    Runs the Rust test suite and a frontend typecheck/build as a gate.
#              Nothing builds or ships unless this passes.
#   2. build   Builds UNSIGNED / ad-hoc installers for all three targets. On a
#              `v*` tag it uploads them to a *draft* GitHub Release; on manual
#              dispatch it only uploads run artifacts.
#   3. publish On a `v*` tag, once every platform has built successfully, flips
#              the draft Release to PUBLISHED so the download links go live. If
#              any build fails the release stays a draft (nothing half-shipped).
#
# No Apple Developer cert, notarization, or Windows Authenticode is used — the
# pipeline runs with zero signing credentials. See SIGNING.md (kept in the parent
# project root, not in the repo) for the step-by-step process to sign locally
# once Apple/Windows certificates are available.
#
# Triggers:
#   - workflow_dispatch : manual test + build, uploads installers as run artifacts.
#   - push tag v*       : test + build + PUBLISH a GitHub Release with installers.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test gate — must pass before anything is built or shipped.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libvulkan-dev + glslc + spirv-headers let transcribe-cpp-sys build
          # ggml's Vulkan backend (the Linux `vulkan` feature).
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libasound2-dev libssl-dev libgtk-layer-shell-dev \
            libvulkan-dev glslc spirv-headers

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: test-ubuntu

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Typecheck + build the frontend so a broken UI fails the pipeline early
      # (cheap, runs in seconds).
      - name: Frontend typecheck & build
        run: bun run build

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  # ---------------------------------------------------------------------------
  # 2. Build — one job per target. Gated on `test`.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: test
    permissions:
      # Needed for tauri-action to create/upload the GitHub Release on tags.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14" # Apple Silicon (arm64) — prebuilt `ort` binary.
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-14" # Intel (x64) — CROSS-COMPILED on Apple Silicon.
            # The `macos-13` Intel runner is retired (jobs sit queued forever), so
            # we cross-compile x86_64 on the arm64 runner instead (see the ONNX +
            # bundling steps below).
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest" # x64 — prebuilt `ort` binary.
            target: "x86_64-pc-windows-msvc"
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
      # transcribe-cpp-sys's cmake build creates paths that exceed Windows'
      # 260-char MAX_PATH. Enable long paths before checkout touches the tree.
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      # Even with long paths enabled, keep the cargo target dir short (C:\t) so
      # deep cmake artifact paths stay well under the limit.
      - name: Shorten build path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = "$drive\t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          echo "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cross-compile x86_64 on the Apple-Silicon runner. The `ort` crate has no
      # prebuilt x86_64-apple-darwin binary, so we dynamically link an x86_64 ONNX
      # Runtime. To get the SAME onnxruntime version the project expects, install
      # an x86_64 Homebrew under Rosetta and `brew install onnxruntime` there.
      # CMAKE_OSX_ARCHITECTURES forces transcribe-cpp's native (ggml/Metal) cmake
      # build to target x86_64. All env vars are exported BEFORE "Build with Tauri".
      - name: Install x86_64 ONNX Runtime via Rosetta Homebrew (Intel cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -euxo pipefail
          sudo softwareupdate --install-rosetta --agree-to-license
          # Install an x86_64 Homebrew at /usr/local (the Intel prefix) by running
          # the installer under Rosetta; NONINTERACTIVE avoids the prompt.
          arch -x86_64 /bin/bash -c 'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
          arch -x86_64 /usr/local/bin/brew install onnxruntime
          {
            echo "ORT_LIB_LOCATION=/usr/local/opt/onnxruntime/lib"
            echo "ORT_PREFER_DYNAMIC_LINK=1"
            echo "CMAKE_OSX_ARCHITECTURES=x86_64"
            echo "MACOSX_DEPLOYMENT_TARGET=10.15"
          } >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # tauri-action runs `bun run tauri build` and bundles the app. On tag builds
      # it creates/uploads to a DRAFT GitHub Release (published later by the
      # `publish` job once all platforms succeed). The Apple/Windows code-signing
      # story is unchanged (ad-hoc), but the two TAURI_SIGNING_* secrets are the
      # updater's *minisign* key: with them set (and createUpdaterArtifacts=true)
      # the bundler emits the updater archives AND a `.sig` next to each one.
      #
      # uploadUpdaterJson is OFF on purpose: each matrix job only knows its own
      # platform, so letting tauri-action write latest.json would have all three
      # jobs clobber it down to a single platform. The `publish` job assembles a
      # correct multi-platform latest.json from every job's signatures instead.
      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: true
          prerelease: false
          # Both OFF: the `publish` job owns the updater assets. It uploads the
          # per-arch archives + `.sig` under deterministic names (macOS archives
          # are otherwise all named `OpenFlow.app.tar.gz` and would collide across
          # the two mac jobs) and writes the multi-platform latest.json.
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          args: ${{ matrix.args }}

      # How the Intel .app links ONNX Runtime is NOT fixed — it depends on what
      # else is in the dependency graph, so this step must handle every case
      # instead of assuming a Homebrew dynamic link always exists (that wrong
      # assumption is exactly what broke v0.15.0: `sherpa-onnx-sys` statically
      # links onnxruntime, ld64 then dead-strips the now-unused dynamic
      # `libonnxruntime.1.dylib` load command, `otool` finds nothing, and the old
      # `cp -L ''` failed with exit 1). Three linkage cases:
      #   (a) an external onnxruntime (Homebrew absolute path, or @rpath) — would
      #       crash on a clean Intel Mac; bundle the dylib into Contents/Frameworks,
      #       repoint to @executable_path, re-sign, and verify no brew path remains.
      #   (b) already @executable_path/../Frameworks — verify the dylib is present.
      #   (c) NO dynamic onnxruntime link at all — statically linked and fully
      #       self-contained (sherpa-onnx static build); nothing to bundle, skip.
      # Only cases (a)/(b) mutate the .app, so only they rebuild the dmg and
      # regenerate + re-sign the updater `.app.tar.gz`/`.sig`; case (c) leaves
      # tauri-action's already-correct, self-contained artifacts untouched. The
      # dmg rebuild and updater re-sign live in ONE step on purpose so a fixed .app
      # and its updater archive can never diverge. ONNX_CASE is exported for the
      # assertion gate below.
      - name: Bundle ONNX Runtime into Intel .app and rebuild artifacts
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          MACOS_DIR="src-tauri/target/x86_64-apple-darwin/release/bundle/macos"
          ENTITLEMENTS="src-tauri/Entitlements.plist"
          DEST_ID="@executable_path/../Frameworks/libonnxruntime.1.dylib"

          # 1. Locate the built .app deterministically; fail loudly if it is missing.
          shopt -s nullglob
          APPS=("$MACOS_DIR"/*.app)
          shopt -u nullglob
          if [ "${#APPS[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one .app under $MACOS_DIR, found ${#APPS[@]}" >&2
            ls -la "$MACOS_DIR" >&2 || true
            exit 1
          fi
          APP="${APPS[0]}"
          BIN="$APP/Contents/MacOS/openflow"
          FW="$APP/Contents/Frameworks/libonnxruntime.1.dylib"
          echo "app: $APP"

          # 2. Classify the onnxruntime linkage. `otool -L` prints tab-indented
          #    "<path> (compatibility ...)" lines; awk's $1 is the clean dylib path.
          CUR="$(otool -L "$BIN" | awk '/libonnxruntime/ {print $1; exit}')"
          echo "linked onnxruntime: '${CUR:-<none>}'"

          if [ -z "$CUR" ]; then
            # (c) Statically linked (no dynamic dependency). Self-contained — nothing
            #     to bundle. tauri-action's dmg + updater archive are already correct.
            echo "onnxruntime is statically linked (no dynamic dependency) — skipping bundling"
            echo "ONNX_CASE=c" >> "$GITHUB_ENV"
            exit 0
          elif [[ "$CUR" == "$DEST_ID" ]]; then
            # (b) Already repointed into the bundle — just confirm the dylib exists.
            [ -f "$FW" ] || { echo "ERROR: binary links $DEST_ID but $FW is missing" >&2; exit 1; }
            echo "onnxruntime already bundled at $DEST_ID"
            echo "ONNX_CASE=b" >> "$GITHUB_ENV"
          else
            # (a) External onnxruntime (brew absolute path or @rpath). Bundle it.
            echo "ONNX_CASE=a" >> "$GITHUB_ENV"
            mkdir -p "$APP/Contents/Frameworks"
            if [ -f "$CUR" ]; then
              SRC="$CUR"                                            # absolute path present on the runner
            elif [ -n "${ORT_LIB_LOCATION:-}" ] && [ -f "$ORT_LIB_LOCATION/libonnxruntime.1.dylib" ]; then
              SRC="$ORT_LIB_LOCATION/libonnxruntime.1.dylib"        # @rpath / non-resolvable: fall back to ORT_LIB_LOCATION
            else
              echo "ERROR: cannot locate a source libonnxruntime.1.dylib (linked '$CUR', ORT_LIB_LOCATION='${ORT_LIB_LOCATION:-}')" >&2
              exit 1
            fi
            echo "bundling from: $SRC"
            cp -L "$SRC" "$FW"
            chmod u+w "$FW"
            install_name_tool -id "$DEST_ID" "$FW"
            install_name_tool -change "$CUR" "$DEST_ID" "$BIN"
            codesign --force -s - "$FW"
            # Entitlements already carry disable-library-validation for the ad-hoc sig.
            codesign --force -s - --entitlements "$ENTITLEMENTS" "$APP"
            codesign --verify --deep --strict "$APP"
            # Hard-verify: @executable_path present AND no absolute brew path remains.
            POST="$(otool -L "$BIN" | grep -i onnxruntime || true)"
            echo "post-bundle onnxruntime links:"; echo "$POST"
            echo "$POST" | grep -qF "$DEST_ID" \
              || { echo "ERROR: expected $DEST_ID after bundling, got: $POST" >&2; exit 1; }
            if echo "$POST" | grep -Eq '(/usr/local/|/opt/homebrew/)[^ ]*onnxruntime'; then
              echo "ERROR: an absolute brew onnxruntime path still remains: $POST" >&2; exit 1
            fi
            [ -f "$FW" ] || { echo "ERROR: $FW missing after bundling" >&2; exit 1; }
          fi

          # 3. The .app changed (case a/b): rebuild the dmg AND regenerate + re-sign
          #    the updater archive from the SAME fixed .app so the dmg, the
          #    `.app.tar.gz`, and its `.sig` can never disagree. On tag builds,
          #    replace the pre-fix dmg tauri-action uploaded.
          VER="$(node -p "require('./package.json').version")"
          DMG="src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/OpenFlow_${VER}_x64.dmg"
          STAGE="$(mktemp -d)"
          ditto "$APP" "$STAGE/OpenFlow.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "OpenFlow" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          ls -lh "$DMG"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            gh release upload "${GITHUB_REF#refs/tags/}" "$DMG" --clobber --repo "$GITHUB_REPOSITORY"
          fi
          # COPYFILE_DISABLE avoids AppleDouble `._*` entries in the archive.
          rm -f "$MACOS_DIR/OpenFlow.app.tar.gz" "$MACOS_DIR/OpenFlow.app.tar.gz.sig"
          COPYFILE_DISABLE=1 tar -C "$MACOS_DIR" -czf "$MACOS_DIR/OpenFlow.app.tar.gz" OpenFlow.app
          bun tauri signer sign "$MACOS_DIR/OpenFlow.app.tar.gz"
          ls -lh "$MACOS_DIR/OpenFlow.app.tar.gz" "$MACOS_DIR/OpenFlow.app.tar.gz.sig"

      # Publish gate for the "Intel onnxruntime linkage" bug class: no downloads,
      # just inspect the .app in place. ALWAYS fail if any external brew
      # onnxruntime path survives. For the bundled cases (a/b) also assert the
      # dylib is in Frameworks, the binary points at @executable_path, and the
      # updater archive actually contains it — the exact things that were wrong or
      # unverified before. For the static case (c) assert the binary is genuinely
      # self-contained (no dynamic onnxruntime dependency at all).
      - name: Assert Intel .app onnxruntime linkage (publish gate)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -euxo pipefail
          MACOS_DIR="src-tauri/target/x86_64-apple-darwin/release/bundle/macos"
          shopt -s nullglob
          APPS=("$MACOS_DIR"/*.app)
          shopt -u nullglob
          [ "${#APPS[@]}" -eq 1 ] || { echo "ERROR: expected one .app, found ${#APPS[@]}" >&2; ls -la "$MACOS_DIR" >&2 || true; exit 1; }
          APP="${APPS[0]}"
          BIN="$APP/Contents/MacOS/openflow"

          LINKS="$(otool -L "$BIN" | grep -i onnxruntime || true)"
          echo "onnxruntime links: '${LINKS:-<none>}'"
          # Universal gate: an absolute brew path must never survive into a shipped app.
          if echo "$LINKS" | grep -Eq '(/usr/local/|/opt/homebrew/)[^ ]*onnxruntime'; then
            echo "ERROR: shipped Intel .app still links an absolute brew onnxruntime path" >&2
            exit 1
          fi

          case "${ONNX_CASE:-}" in
            a|b)
              echo "case $ONNX_CASE: expecting a bundled dylib"
              ls -la "$APP/Contents/Frameworks/"
              [ -f "$APP/Contents/Frameworks/libonnxruntime.1.dylib" ] \
                || { echo "ERROR: Frameworks/libonnxruntime.1.dylib missing" >&2; exit 1; }
              echo "$LINKS" | grep -qF "@executable_path/../Frameworks/libonnxruntime.1.dylib" \
                || { echo "ERROR: binary does not link @executable_path onnxruntime" >&2; exit 1; }
              tar -tzf "$MACOS_DIR/OpenFlow.app.tar.gz" | grep -qi 'Frameworks/libonnxruntime' \
                || { echo "ERROR: updater archive lacks Frameworks/libonnxruntime" >&2; exit 1; }
              echo "PASS: onnxruntime bundled + repointed + present in updater archive"
              ;;
            c)
              echo "case c: expecting a self-contained (statically linked) binary"
              [ -z "$LINKS" ] || { echo "ERROR: case c but a dynamic onnxruntime link exists: $LINKS" >&2; exit 1; }
              echo "PASS: onnxruntime statically linked, no external dependency"
              ;;
            *)
              echo "ERROR: ONNX_CASE not set by the bundle step (was it skipped?)" >&2
              exit 1
              ;;
          esac

      # Always upload the installers as workflow run artifacts (for both manual
      # dispatch and tag builds). macOS -> .dmg, Windows -> .exe (NSIS) + .msi.
      - name: Upload installers (macOS)
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: openflow-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

      # Windows bundles land under the shortened CARGO_TARGET_DIR (C:\t), not
      # src-tauri/target, because of the "Shorten build path" step above.
      - name: Upload installers (Windows)
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: openflow-${{ matrix.target }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/bundle/nsis/*.exe
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      # Updater artifacts (the archive the app self-updates from + its `.sig`),
      # kept in a SEPARATE per-target run artifact so the `publish` job can pull
      # each platform's signed archive without the macOS `OpenFlow.app.tar.gz`
      # name colliding across the two mac jobs. macOS -> .app.tar.gz(+.sig);
      # Windows -> the NSIS -setup.exe(+.sig).
      - name: Upload updater artifacts (macOS)
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: openflow-updater-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 30

      - name: Upload updater artifacts (Windows)
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: openflow-updater-${{ matrix.target }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. Publish — flip the draft Release to published, only after ALL platforms
  #    built successfully and only on a `v*` tag. Keeps a failed matrix from
  #    shipping a half-populated release.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pull every platform's signed updater archive + `.sig` (one run artifact
      # per target, so the identically-named macOS archives don't collide).
      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openflow-updater-*
          path: updater-dl

      # Assemble ONE multi-platform latest.json from the per-target signatures and
      # attach it (plus the per-arch archives + sigs under deterministic names) to
      # the draft release. The updater endpoint
      # (releases/latest/download/latest.json) serves this after the release is
      # published + marked latest below. Schema: Tauri v2 static updater manifest.
      - name: Assemble and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          NOTES="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body || true)"
          if [ -z "$NOTES" ]; then
            NOTES="See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          fi

          DA_DIR="updater-dl/openflow-updater-aarch64-apple-darwin"
          DX_DIR="updater-dl/openflow-updater-x86_64-apple-darwin"
          WX_DIR="updater-dl/openflow-updater-x86_64-pc-windows-msvc"

          # Canonical, collision-free asset names. Renaming does not invalidate a
          # signature — minisign signs the archive bytes, not the filename.
          DA_ASSET="OpenFlow_aarch64.app.tar.gz"
          DX_ASSET="OpenFlow_x64.app.tar.gz"
          WX_SRC="$(ls "$WX_DIR"/*-setup.exe)"
          WX_ASSET="$(basename "$WX_SRC")"

          cp "$DA_DIR/OpenFlow.app.tar.gz"       "$DA_ASSET"
          cp "$DA_DIR/OpenFlow.app.tar.gz.sig"   "$DA_ASSET.sig"
          cp "$DX_DIR/OpenFlow.app.tar.gz"       "$DX_ASSET"
          cp "$DX_DIR/OpenFlow.app.tar.gz.sig"   "$DX_ASSET.sig"
          cp "$WX_SRC"                           "$WX_ASSET"
          cp "$WX_SRC.sig"                       "$WX_ASSET.sig"

          DL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg da_url "$DL/$DA_ASSET" --rawfile da_sig "$DA_ASSET.sig" \
            --arg dx_url "$DL/$DX_ASSET" --rawfile dx_sig "$DX_ASSET.sig" \
            --arg wx_url "$DL/$WX_ASSET" --rawfile wx_sig "$WX_ASSET.sig" \
            '{
               version: $version,
               notes: $notes,
               pub_date: $pub_date,
               platforms: {
                 "darwin-aarch64": { signature: ($da_sig | rtrimstr("\n")), url: $da_url },
                 "darwin-x86_64":  { signature: ($dx_sig | rtrimstr("\n")), url: $dx_url },
                 "windows-x86_64": { signature: ($wx_sig | rtrimstr("\n")), url: $wx_url }
               }
             }' > latest.json
          cat latest.json

          # tauri-action may have uploaded the ambiguous default-named macOS
          # archive; drop it so only the per-arch assets remain (best-effort).
          gh release delete-asset "$TAG" "OpenFlow.app.tar.gz" -y --repo "$GITHUB_REPOSITORY" || true
          gh release delete-asset "$TAG" "OpenFlow.app.tar.gz.sig" -y --repo "$GITHUB_REPOSITORY" || true

          gh release upload "$TAG" \
            "$DA_ASSET" "$DA_ASSET.sig" \
            "$DX_ASSET" "$DX_ASSET.sig" \
            "$WX_ASSET" "$WX_ASSET.sig" \
            latest.json \
            --clobber --repo "$GITHUB_REPOSITORY"

      # tauri-action created the release as a draft (coalesced onto the same tag).
      # Publish it now that every installer is attached.
      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing release ${GITHUB_REF_NAME}"
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --latest
          echo "Release ${GITHUB_REF_NAME} is now public:"
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json url --jq .url
