name: "test"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
  # Runs on EVERY PR into main (no path filter) so it can serve as a required
  # status check — a path-filtered required check would hang PRs that don't touch
  # src-tauri on "Expected". Branch protection requires this check to pass.
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libvulkan-dev + glslc + spirv-headers let transcribe-cpp-sys build
          # ggml's Vulkan backend (the Linux `vulkan` feature). Mirrors the apt
          # set transcribe.cpp's native-ci uses to build -DTRANSCRIBE_VULKAN=ON.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libssl-dev libgtk-layer-shell-dev \
            libvulkan-dev glslc spirv-headers

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test
