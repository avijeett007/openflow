name: "code quality"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - "tailwind.config.*"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - "tailwind.config.*"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # OpenFlow is an English-first solo fork: en/translation.json is the single
      # source of truth and i18next falls back to English at runtime for any key a
      # locale hasn't translated. Missing keys in the 18 inherited non-English
      # locales are reported for visibility but must NOT block the pipeline
      # (hand-translating every new key across 18 languages would just bake in
      # stale strings). Lint + prettier below stay hard gates.
      - name: Check translation consistency (informational)
        continue-on-error: true
        run: bun run check:translations

      - name: Run ESLint
        run: bun run lint

      - name: Run prettier
        run: bun run format:check
