# OpenFlow doesn't use GitHub Discussions — bugs and feature requests both go to
# Issues (see README / CONTRIBUTING.md). Blank issues are enabled so feature
# requests and questions have somewhere to land alongside the Bug Report template.
blank_issues_enabled: true
contact_links:
  - name: 💡 Feature request or idea
    url: https://github.com/avijeett007/openflow/issues/new
    about: Open an issue describing the problem you'd like solved. Features land over time — I just can't promise a timeline.
  - name: 🏢 knotie.ai
    url: https://knotie.ai
    about: The team behind OpenFlow — white-label and sell AI services.
